syntax = "proto3";

package grpc.gateway.protoc_gen_openapiv3.options;

import "google/protobuf/struct.proto";

option go_package = "github.com/grpc-ecosystem/grpc-gateway/v2/protoc-gen-openapiv3/options";

// `OpenAPI` is a representation of OpenAPI v3 specification's OpenAPI object.
//
// See: https://spec.openapis.org/oas/v3.1.0#openapi-object
//
// Example:
//
//  option (grpc.gateway.protoc_gen_openapiv3.options.openapiv3_openapi) = {
//    info: {
//      title: "Echo API";
//      version: "1.0";
//      description: "A simple echo service";
//      contact: {
//        name: "gRPC-Gateway project";
//        url: "https://github.com/grpc-ecosystem/grpc-gateway";
//        email: "none@example.com";
//      };
//      license: {
//        name: "BSD 3-Clause License";
//        url: "https://github.com/grpc-ecosystem/grpc-gateway/blob/main/LICENSE";
//      };
//    };
//    servers: [
//      { url: "https://api.example.com/v1"; description: "Production"; }
//    ];
//  };
//
message OpenAPI {
  // Specifies the OpenAPI Specification version being used.
  // The value MUST be "3.1.0" (recommended) or "3.0.x" for backwards compatibility.
  string openapi = 1;
  // Provides metadata about the API. The metadata MAY be used by
  // tooling as required.
  Info info = 2;
  // An array of Server Objects, which provide connectivity information to a
  // target server.
  repeated Server servers = 3;
  // field 4 is reserved for 'paths'.
  reserved 4;
  // An element to hold various schemas for the document.
  Components components = 5;
  // A declaration of which security mechanisms can be used across the API.
  repeated SecurityRequirement security = 6;
  // A list of tags used by the document with additional metadata.
  repeated Tag tags = 7;
  // Additional external documentation.
  ExternalDocumentation external_docs = 8;
  // Custom properties that start with "x-" such as "x-foo" used to describe
  // extra functionality that is not covered by the standard OpenAPI Specification.
  map<string, google.protobuf.Value> extensions = 9;
}

// `Info` is a representation of OpenAPI v3 specification's Info object.
//
// See: https://spec.openapis.org/oas/v3.1.0#info-object
//
message Info {
  // REQUIRED. The title of the API.
  string title = 1;
  // A short summary of the API.
  string summary = 2;
  // A description of the API. CommonMark syntax MAY be used for rich text
  // representation.
  string description = 3;
  // A URL to the Terms of Service for the API. This MUST be in the format of
  // a URL.
  string terms_of_service = 4;
  // The contact information for the exposed API.
  Contact contact = 5;
  // The license information for the exposed API.
  License license = 6;
  // REQUIRED. The version of the OpenAPI document.
  string version = 7;
  // Custom properties that start with "x-" such as "x-foo".
  map<string, google.protobuf.Value> extensions = 8;
}

// `Contact` is a representation of OpenAPI v3 specification's Contact object.
//
// See: https://spec.openapis.org/oas/v3.1.0#contact-object
//
message Contact {
  // The identifying name of the contact person/organization.
  string name = 1;
  // The URL pointing to the contact information. This MUST be in the format of
  // a URL.
  string url = 2;
  // The email address of the contact person/organization. This MUST be in the
  // format of an email address.
  string email = 3;
}

// `License` is a representation of OpenAPI v3 specification's License object.
//
// See: https://spec.openapis.org/oas/v3.1.0#license-object
//
message License {
  // REQUIRED. The license name used for the API.
  string name = 1;
  // An SPDX license expression for the API. (v3.1 only)
  string identifier = 2;
  // A URL to the license used for the API. This MUST be in the format of a URL.
  string url = 3;
}

// `Server` is a representation of OpenAPI v3 specification's Server object.
//
// See: https://spec.openapis.org/oas/v3.1.0#server-object
//
message Server {
  // REQUIRED. A URL to the target host.
  string url = 1;
  // An optional string describing the host designated by the URL.
  string description = 2;
  // A map between a variable name and its value.
  map<string, ServerVariable> variables = 3;
}

// `ServerVariable` is a representation of OpenAPI v3 specification's
// Server Variable object.
//
// See: https://spec.openapis.org/oas/v3.1.0#server-variable-object
//
message ServerVariable {
  // An enumeration of string values to be used if the substitution options
  // are from a limited set.
  repeated string enum = 1;
  // REQUIRED. The default value to use for substitution.
  string default = 2;
  // An optional description for the server variable.
  string description = 3;
}

// `Components` is a representation of OpenAPI v3 specification's Components object.
//
// See: https://spec.openapis.org/oas/v3.1.0#components-object
//
message Components {
  // An object to hold reusable Schema Objects.
  map<string, SchemaOrReference> schemas = 1;
  // An object to hold reusable Response Objects.
  // Uses repeated NamedResponseOrReference to preserve insertion order.
  repeated NamedResponseOrReference responses = 2;
  // An object to hold reusable Parameter Objects.
  map<string, Parameter> parameters = 3;
  // An object to hold reusable Example Objects.
  map<string, Example> examples = 4;
  // An object to hold reusable Request Body Objects.
  map<string, RequestBody> request_bodies = 5;
  // An object to hold reusable Header Objects.
  // Values can be inline Header definitions or references to other headers.
  map<string, HeaderOrReference> headers = 6;
  // An object to hold reusable Security Scheme Objects.
  map<string, SecurityScheme> security_schemes = 7;
  // An object to hold reusable Link Objects.
  map<string, Link> links = 8;
  // Custom properties that start with "x-" such as "x-foo".
  map<string, google.protobuf.Value> extensions = 9;
}

// `Operation` is a representation of OpenAPI v3 specification's Operation object.
//
// See: https://spec.openapis.org/oas/v3.1.0#operation-object
//
// Example:
//
//  service EchoService {
//    rpc Echo(SimpleMessage) returns (SimpleMessage) {
//      option (google.api.http) = {
//        get: "/v1/example/echo/{id}"
//      };
//
//      option (grpc.gateway.protoc_gen_openapiv3.options.openapiv3_operation) = {
//        summary: "Get a message.";
//        operation_id: "getMessage";
//        tags: "echo";
//        responses: {
//          key: "200"
//          value: {
//            description: "OK";
//          }
//        }
//      };
//    }
//  }
message Operation {
  // A list of tags for API documentation control.
  repeated string tags = 1;
  // A short summary of what the operation does.
  string summary = 2;
  // A verbose explanation of the operation behavior. CommonMark syntax MAY be
  // used for rich text representation.
  string description = 3;
  // Additional external documentation for this operation.
  ExternalDocumentation external_docs = 4;
  // Unique string used to identify the operation.
  string operation_id = 5;
  // Custom parameters (header and cookie) for this operation.
  // Path and query parameters are derived from the HTTP binding.
  OperationParameters parameters = 6;
  // The request body applicable for this operation.
  // Only inline RequestBody is supported. References are not allowed because
  // the request body schema is derived from the proto input message.
  RequestBody request_body = 7;
  // The list of possible responses as they are returned from executing this
  // operation.
  Responses responses = 8;
  // Declares this operation to be deprecated. Default value is false.
  bool deprecated = 9;
  // A declaration of which security mechanisms can be used for this operation.
  repeated SecurityRequirement security = 10;
  // An alternative server array to service this operation.
  repeated Server servers = 11;
  // Custom properties that start with "x-" such as "x-foo".
  map<string, google.protobuf.Value> extensions = 12;
}

// `Response` is a representation of OpenAPI v3 specification's Response object.
//
// See: https://spec.openapis.org/oas/v3.1.0#response-object
//
message Response {
  // REQUIRED. A description of the response. CommonMark syntax MAY be used
  // for rich text representation.
  string description = 1;
  // Maps a header name to its definition.
  // Values can be inline Header definitions or references to other headers.
  map<string, HeaderOrReference> headers = 2;
  // A map containing descriptions of potential response payloads.
  map<string, MediaType> content = 3;
  // A map of operations links that can be followed from the response.
  map<string, Link> links = 4;
  // Custom properties that start with "x-" such as "x-foo".
  map<string, google.protobuf.Value> extensions = 5;
}

// `ResponseOrReference` is a discriminated union that can be either an inline Response
// or a Reference. This allows responses to reference reusable responses defined in
// components/responses.
// Aligned with gnostic-models pattern.
message ResponseOrReference {
  oneof oneof {
    Response response = 1;
    Reference reference = 2;
  }
}

// Automatically-generated message used to represent maps of ResponseOrReference as ordered (name,value) pairs.
message NamedResponseOrReference {
  // Map key
  string name = 1;
  // Mapped value
  ResponseOrReference value = 2;
}

// `Responses` is a representation of OpenAPI v3 specification's Responses object.
// A container for the expected responses of an operation. The container maps an HTTP
// response code to the expected response.
//
// See: https://spec.openapis.org/oas/v3.1.0#responses-object
//
message Responses {
  // The documentation of responses other than the ones declared for specific HTTP
  // response codes. Use this field to cover undeclared responses.
  ResponseOrReference default = 1;
  // The documentation of responses for specific HTTP response codes.
  // Uses repeated NamedResponseOrReference to preserve insertion order.
  repeated NamedResponseOrReference response_or_reference = 2;
  // Custom properties that start with "x-" such as "x-foo".
  map<string, google.protobuf.Value> extensions = 3;
}

// `MediaType` is a representation of OpenAPI v3 specification's Media Type object.
//
// See: https://spec.openapis.org/oas/v3.1.0#media-type-object
//
message MediaType {
  // The schema defining the content of the request, response, or parameter.
  SchemaOrReference schema = 1;
  // Example of the media type. Deprecated in OpenAPI 3.1.0, use examples instead.
  string example = 2;
  // Examples of the media type. Each example SHOULD match the media type and
  // specified schema if present. Values can be inline examples or references
  // to examples defined in components/examples.
  map<string, ExampleOrReference> examples = 3;
  // A map between a property name and its encoding information.
  map<string, Encoding> encoding = 4;
  // Custom properties that start with "x-" such as "x-foo".
  map<string, google.protobuf.Value> extensions = 5;
}

// `RequestBody` is a representation of OpenAPI v3 specification's Request Body object.
//
// See: https://spec.openapis.org/oas/v3.1.0#request-body-object
//
message RequestBody {
  // A brief description of the request body.
  string description = 1;
  // REQUIRED. The content of the request body.
  map<string, MediaType> content = 2;
  // Determines if the request body is required in the request.
  bool required = 3;
  // Custom properties that start with "x-" such as "x-foo".
  map<string, google.protobuf.Value> extensions = 4;
}

// `Parameter` is a representation of OpenAPI v3 specification's Parameter object.
//
// See: https://spec.openapis.org/oas/v3.1.0#parameter-object
//
message Parameter {
  // REQUIRED. The name of the parameter.
  string name = 1;
  // REQUIRED. The location of the parameter. Possible values are "query",
  // "header", "path" or "cookie".
  string in = 2;
  // A brief description of the parameter.
  string description = 3;
  // Determines whether this parameter is mandatory.
  bool required = 4;
  // Specifies that a parameter is deprecated.
  bool deprecated = 5;
  // Sets the ability to pass empty-valued parameters.
  bool allow_empty_value = 6;
  // Describes how the parameter value will be serialized.
  string style = 7;
  // When this is true, parameter values of type array or object generate
  // separate parameters for each value.
  bool explode = 8;
  // Determines whether the parameter value SHOULD allow reserved characters.
  bool allow_reserved = 9;
  // The schema defining the type used for the parameter.
  // Can be an inline schema or a reference to a schema in components/schemas.
  SchemaOrReference schema = 10;
  // Example of the parameter's potential value. Deprecated in OpenAPI 3.1.0, use examples instead.
  string example = 11;
  // Examples of the parameter's potential value. Values can be inline examples
  // or references to examples defined in components/examples.
  map<string, ExampleOrReference> examples = 12;
  // Custom properties that start with "x-" such as "x-foo".
  map<string, google.protobuf.Value> extensions = 13;
}

// `Header` is a representation of OpenAPI v3 specification's Header object.
//
// See: https://spec.openapis.org/oas/v3.1.0#header-object
//
message Header {
  // A brief description of the header.
  string description = 1;
  // Determines whether this header is mandatory.
  bool required = 2;
  // Specifies that a header is deprecated.
  bool deprecated = 3;
  // Sets the ability to pass empty-valued headers.
  bool allow_empty_value = 4;
  // Describes how the header value will be serialized.
  string style = 5;
  // When this is true, header values of type array or object generate
  // separate parameters for each value.
  bool explode = 6;
  // Determines whether the header value SHOULD allow reserved characters.
  bool allow_reserved = 7;
  // The schema defining the type used for the header.
  // Can be an inline schema or a reference to a schema in components/schemas.
  SchemaOrReference schema = 8;
  // Example of the header's potential value. Deprecated in OpenAPI 3.1.0, use examples instead.
  string example = 9;
  // Examples of the header's potential value. Values can be inline examples
  // or references to examples defined in components/examples.
  map<string, ExampleOrReference> examples = 10;
  // Custom properties that start with "x-" such as "x-foo".
  map<string, google.protobuf.Value> extensions = 11;
}

// `Example` is a representation of OpenAPI v3 specification's Example object.
//
// See: https://spec.openapis.org/oas/v3.1.0#example-object
//
message Example {
  // Short description for the example.
  string summary = 1;
  // Long description for the example. CommonMark syntax MAY be used for rich
  // text representation.
  string description = 2;
  // Embedded literal example. The value field and externalValue field are
  // mutually exclusive.
  string value = 3;
  // A URI that points to the literal example.
  string external_value = 4;
  // Custom properties that start with "x-" such as "x-foo".
  map<string, google.protobuf.Value> extensions = 5;
}

// `ExampleOrReference` is a discriminated union that can be either an inline Example
// or a Reference. This allows examples to reference reusable examples defined in
// components/examples.
// Aligned with gnostic-models pattern.
message ExampleOrReference {
  oneof oneof {
    Example example = 1;
    Reference reference = 2;
  }
}

// `HeaderOrReference` is a discriminated union that can be either an inline Header
// or a Reference. This allows headers to reference reusable headers defined in
// components/headers.
// Used in Response.headers and Components.headers where the name is the map key.
// Aligned with gnostic-models pattern.
message HeaderOrReference {
  oneof oneof {
    Header header = 1;
    Reference reference = 2;
  }
}

// `HeaderParameter` is a header parameter for use in operation parameters.
// Unlike `Header`, this includes the `name` field since operation parameters
// are represented as an array, not a map.
//
// See: https://spec.openapis.org/oas/v3.1.0#parameter-object
//
message HeaderParameter {
  // REQUIRED. The name of the header parameter (e.g., "X-Request-ID").
  string name = 1;
  // A brief description of the header parameter.
  string description = 2;
  // Determines whether this header parameter is mandatory.
  bool required = 3;
  // Specifies that the header parameter is deprecated.
  bool deprecated = 4;
  // Sets the ability to pass empty-valued headers.
  bool allow_empty_value = 5;
  // Describes how the header value will be serialized.
  string style = 6;
  // When this is true, header values of type array or object generate
  // separate parameters for each value.
  bool explode = 7;
  // Determines whether the header value SHOULD allow reserved characters.
  bool allow_reserved = 8;
  // The schema defining the type used for the header parameter.
  // Can be an inline schema or a reference to a schema in components/schemas.
  SchemaOrReference schema = 9;
  // Example of the header's potential value.
  string example = 10;
  // Examples of the header's potential value.
  map<string, ExampleOrReference> examples = 11;
  // Custom properties that start with "x-" such as "x-foo".
  map<string, google.protobuf.Value> extensions = 12;
}

// `HeaderParameterOrReference` is a discriminated union for operation header parameters.
// Can be either an inline HeaderParameter (which includes the name) or a Reference.
// This design avoids redundant name fields when using references.
//
// Example usage:
//
//  // Inline header - name is part of the HeaderParameter
//  { header: { name: "X-Request-ID", description: "...", required: true } }
//
//  // Reference - no name needed, the component defines it
//  { reference: { ref: "#/components/parameters/PreferHeader" } }
//
message HeaderParameterOrReference {
  oneof oneof {
    HeaderParameter header = 1;
    Reference reference = 2;
  }
}

// `Cookie` is a representation of OpenAPI v3 specification's cookie parameter.
// Unlike Header, Cookie parameters have fewer options (no style, explode, allow_reserved).
//
// See: https://spec.openapis.org/oas/v3.1.0#parameter-object
//
message Cookie {
  // A brief description of the cookie parameter.
  string description = 1;
  // Determines whether this cookie parameter is mandatory.
  bool required = 2;
  // Specifies that the cookie parameter is deprecated.
  bool deprecated = 3;
  // The schema defining the type used for the cookie parameter.
  // If not specified, defaults to string type.
  SchemaOrReference schema = 4;
  // Example of the cookie's potential value. Deprecated in OpenAPI 3.1.0, use examples instead.
  string example = 5;
  // Examples of the cookie's potential value.
  map<string, ExampleOrReference> examples = 6;
  // Custom properties that start with "x-" such as "x-foo".
  map<string, google.protobuf.Value> extensions = 7;
}

// `CookieOrReference` is a discriminated union that can be either an inline Cookie
// or a Reference. This allows cookies to reference reusable parameters defined in
// components/parameters.
// Aligned with gnostic-models pattern.
message CookieOrReference {
  oneof oneof {
    Cookie cookie = 1;
    Reference reference = 2;
  }
}

// `CookieParameter` is a cookie parameter for use in operation parameters.
// Unlike `Cookie`, this includes the `name` field since operation parameters
// are represented as an array, not a map.
//
// See: https://spec.openapis.org/oas/v3.1.0#parameter-object
//
message CookieParameter {
  // REQUIRED. The name of the cookie parameter (e.g., "session_id").
  string name = 1;
  // A brief description of the cookie parameter.
  string description = 2;
  // Determines whether this cookie parameter is mandatory.
  bool required = 3;
  // Specifies that the cookie parameter is deprecated.
  bool deprecated = 4;
  // The schema defining the type used for the cookie parameter.
  // If not specified, defaults to string type.
  SchemaOrReference schema = 5;
  // Example of the cookie's potential value.
  string example = 6;
  // Examples of the cookie's potential value.
  map<string, ExampleOrReference> examples = 7;
  // Custom properties that start with "x-" such as "x-foo".
  map<string, google.protobuf.Value> extensions = 8;
}

// `CookieParameterOrReference` is a discriminated union for operation cookie parameters.
// Can be either an inline CookieParameter (which includes the name) or a Reference.
// This design avoids redundant name fields when using references.
//
// Example usage:
//
//  // Inline cookie - name is part of the CookieParameter
//  { cookie: { name: "session_id", description: "...", required: true } }
//
//  // Reference - no name needed, the component defines it
//  { reference: { ref: "#/components/parameters/SessionId" } }
//
message CookieParameterOrReference {
  oneof oneof {
    CookieParameter cookie = 1;
    Reference reference = 2;
  }
}

// `OperationParameters` allows specifying custom header and cookie parameters for operations.
// Path and query parameters are derived from the HTTP binding, but header and cookie
// parameters must be explicitly specified using this message.
//
// Example usage:
//
//  option (grpc.gateway.protoc_gen_openapiv3.options.openapiv3_operation) = {
//    parameters: {
//      headers: [
//        // Inline header parameter - name is part of the header definition
//        {
//          header: {
//            name: "X-Request-ID"
//            description: "Request tracking ID"
//            required: true
//          }
//        },
//        // Reference to a component parameter - no name needed
//        { reference: { ref: "#/components/parameters/PreferHeader" } }
//      ]
//      cookies: [
//        // Inline cookie parameter
//        {
//          cookie: {
//            name: "session_id"
//            description: "Session identifier"
//          }
//        },
//        // Reference to a component parameter
//        { reference: { ref: "#/components/parameters/TrackingCookie" } }
//      ]
//    }
//  };
//
message OperationParameters {
  // Custom header parameters for the operation.
  // Each entry is either an inline HeaderParameter (with name inside) or a Reference.
  repeated HeaderParameterOrReference headers = 1;
  // Custom cookie parameters for the operation.
  // Each entry is either an inline CookieParameter (with name inside) or a Reference.
  repeated CookieParameterOrReference cookies = 2;
}

// `NamedExampleOrReference` is a name-value pair for ordered example maps.
// Used for examples fields to preserve insertion order.
// Aligned with gnostic-models pattern.
message NamedExampleOrReference {
  // The example name (key in the examples map).
  string name = 1;
  // The example or reference value.
  ExampleOrReference value = 2;
}

// `Encoding` is a representation of OpenAPI v3 specification's Encoding object.
//
// See: https://spec.openapis.org/oas/v3.1.0#encoding-object
//
message Encoding {
  // The Content-Type for encoding a specific property.
  string content_type = 1;
  // A map allowing additional information to be provided as headers.
  map<string, Header> headers = 2;
  // Describes how a specific property value will be serialized.
  string style = 3;
  // When this is true, property values of type array or object generate
  // separate parameters for each value of the array, or key-value-pair of the map.
  bool explode = 4;
  // Determines whether the parameter value SHOULD allow reserved characters.
  bool allow_reserved = 5;
  // Custom properties that start with "x-" such as "x-foo".
  map<string, google.protobuf.Value> extensions = 6;
}

// `Discriminator` is a representation of OpenAPI v3 specification's Discriminator object.
//
// See: https://spec.openapis.org/oas/v3.1.0#discriminator-object
//
// When request bodies or response payloads may be one of a number of different schemas,
// a discriminator object can be used to aid in serialization, deserialization, and validation.
//
message Discriminator {
  // REQUIRED. The name of the property in the payload that will hold the
  // discriminator value.
  string property_name = 1;
  // An object to hold mappings between payload values and schema names or
  // references.
  map<string, string> mapping = 2;
}

// `AdditionalPropertiesItem` represents the additionalProperties field which can be
// either a boolean or a schema.
//
message AdditionalPropertiesItem {
  oneof kind {
    // Allows additional properties of any type.
    bool allows = 1;
    // Schema for additional properties.
    SchemaOrReference schema_or_reference = 2;
  }
}

// `Reference` represents the OpenAPI Reference Object.
// In OpenAPI 3.1.0, references can include summary and description overrides.
// See: https://spec.openapis.org/oas/v3.1.0#reference-object
// Aligned with gnostic-models pattern.
message Reference {
  // REQUIRED. The $ref URI reference.
  // Serializes to "$ref" in JSON via json_name option.
  string ref = 1 [json_name = "$ref"];
  // v3.1.0: Optional summary override for the referenced content.
  string summary = 2;
  // v3.1.0: Optional description override for the referenced content.
  string description = 3;
}

// `SchemaOrReference` is a discriminated union that can be either an inline Schema
// or a Reference. This provides compile-time type safety for schema composition
// (allOf, anyOf, oneOf, etc.) and enables proper support for OpenAPI 3.1.0 reference overrides.
// See: https://spec.openapis.org/oas/v3.1.0#schema-object
// Aligned with gnostic-models pattern.
message SchemaOrReference {
  oneof oneof {
    Schema value = 1;
    Reference reference = 2;
  }
}

// `NamedSchemaOrReference` is a name-value pair for ordered schema maps.
// Used for properties to preserve insertion order (important for JSON output consistency).
// Aligned with gnostic-models pattern.
message NamedSchemaOrReference {
  // The property name.
  string name = 1;
  // The schema or reference value.
  SchemaOrReference value = 2;
}

// `Link` is a representation of OpenAPI v3 specification's Link object.
//
// See: https://spec.openapis.org/oas/v3.1.0#link-object
//
message Link {
  // A relative or absolute URI reference to an OAS operation.
  string operation_ref = 1;
  // The name of an existing, resolvable OAS operation.
  string operation_id = 2;
  // A map representing parameters to pass to an operation.
  map<string, string> parameters = 3;
  // A literal value or expression to use as a request body.
  string request_body = 4;
  // A description of the link.
  string description = 5;
  // A server object to be used by the target operation.
  Server server = 6;
  // Custom properties that start with "x-" such as "x-foo".
  map<string, google.protobuf.Value> extensions = 7;
}

// `Schema` is a representation of OpenAPI v3 specification's Schema object.
//
// See: https://spec.openapis.org/oas/v3.1.0#schema-object
//
// Example:
//
//  message SimpleMessage {
//    option (grpc.gateway.protoc_gen_openapiv3.options.openapiv3_schema) = {
//      title: "SimpleMessage"
//      description: "A simple message."
//      required: ["id"]
//      example: "{\"id\": \"123\"}"
//    };
//
//    string id = 1 [
//      (grpc.gateway.protoc_gen_openapiv3.options.openapiv3_field) = {
//        description: "The unique identifier of the simple message."
//        min_length: 1
//        max_length: 100
//      }
//    ];
//  }
//
message Schema {
  // The title of the schema.
  string title = 1;
  // A description of the schema. CommonMark syntax MAY be used for rich text
  // representation.
  string description = 2;
  // The default value represents what would be assumed by the consumer of the
  // input as the value of the schema if one is not provided.
  string default = 3;
  // Allows sending a null value for the defined schema. Default value is false.
  bool nullable = 4;
  // Relevant only for Schema "properties" definitions. Declares the property as
  // "read only".
  bool read_only = 5;
  // Relevant only for Schema "properties" definitions. Declares the property as
  // "write only".
  bool write_only = 6;
  // Specifies that a schema is deprecated and SHOULD be transitioned out of
  // usage.
  bool deprecated = 7;
  // Additional external documentation for this schema.
  ExternalDocumentation external_docs = 8;
  // A free-form property to include an example of an instance for this schema.
  string example = 9;
  // Custom properties that start with "x-" such as "x-foo".
  map<string, google.protobuf.Value> extensions = 10;

  // JSON Schema validation keywords
  // Using optional to allow distinguishing "not set" from "set to 0"
  optional double multiple_of = 11;
  optional double maximum = 12;
  // In OpenAPI 3.1.0 (JSON Schema), exclusiveMaximum is a number, not a boolean.
  // The value is the exclusive upper bound.
  optional double exclusive_maximum = 13;
  optional double minimum = 14;
  // In OpenAPI 3.1.0 (JSON Schema), exclusiveMinimum is a number, not a boolean.
  // The value is the exclusive lower bound.
  optional double exclusive_minimum = 15;
  uint64 max_length = 16;
  uint64 min_length = 17;
  string pattern = 18;
  uint64 max_items = 19;
  uint64 min_items = 20;
  bool unique_items = 21;
  uint64 max_properties = 22;
  uint64 min_properties = 23;
  repeated string required = 24;
  repeated string enum = 25;
  // In OpenAPI 3.1.0, type can be an array to support nullable types.
  // E.g., type: ["string", "null"] instead of type: string + nullable: true.
  // For single types, use a single-element array or the generator will handle it.
  repeated string type = 26;
  string format = 27;

  // Schema composition keywords (OpenAPI v3 / JSON Schema)

  // An instance validates successfully against this keyword if it validates
  // successfully against all schemas defined by this keyword's value.
  // Each item can be an inline schema or a reference.
  repeated SchemaOrReference all_of = 28;
  // An instance validates successfully against this keyword if it validates
  // successfully against at least one schema defined by this keyword's value.
  // Each item can be an inline schema or a reference.
  repeated SchemaOrReference any_of = 29;
  // An instance validates successfully against this keyword if it validates
  // successfully against exactly one schema defined by this keyword's value.
  // Each item can be an inline schema or a reference.
  repeated SchemaOrReference one_of = 30;
  // An instance is valid against this keyword if it fails to validate
  // successfully against the schema defined by this keyword.
  // Can be an inline schema or a reference.
  SchemaOrReference not = 31;

  // Adds support for polymorphism. The discriminator is used to determine which
  // of a set of schemas a payload is expected to satisfy.
  Discriminator discriminator = 32;

  // Array-specific keywords

  // Value MUST be a valid JSON Schema. Used to validate all items in an array.
  // Can be an inline schema or a reference.
  SchemaOrReference items = 33;
  // Value MUST be an array of valid JSON Schemas. Used to validate tuple-like arrays.
  // Each item can be an inline schema or a reference.
  repeated SchemaOrReference prefix_items = 34;
  // Used with prefixItems to control validation of additional items.
  // Can be an inline schema or a reference.
  SchemaOrReference contains = 35;
  // Minimum number of items that must match the contains schema.
  uint64 min_contains = 36;
  // Maximum number of items that must match the contains schema.
  uint64 max_contains = 37;

  // Object-specific keywords

  // Value MUST be an object. Each value of this object MUST be a valid JSON Schema.
  // Using repeated NamedSchemaOrReference preserves property ordering (important for JSON output).
  // Each property value can be an inline schema or a reference.
  repeated NamedSchemaOrReference properties = 38;
  // Controls handling of extra properties not covered by the properties keyword.
  // Can be a boolean or a schema/reference.
  AdditionalPropertiesItem additional_properties = 39;
  // Value MUST be a valid JSON Schema. Used to validate property names.
  // Can be an inline schema or a reference.
  SchemaOrReference property_names = 40;
  // Value MUST be an object where each value is a valid JSON Schema.
  // Properties must match the regex key patterns.
  // Each pattern value can be an inline schema or a reference.
  repeated NamedSchemaOrReference pattern_properties = 41;
}

// `EnumSchema` is a subset of Schema fields applicable to Enums.
//
// Example:
//
//  enum Status {
//    option (grpc.gateway.protoc_gen_openapiv3.options.openapiv3_enum) = {
//      title: "Status";
//      description: "The status of the operation.";
//    };
//    UNKNOWN = 0;
//    ACTIVE = 1;
//    INACTIVE = 2;
//  }
//
message EnumSchema {
  // The title of the enum.
  string title = 1;
  // A description of the enum.
  string description = 2;
  // The default value for this enum.
  string default = 3;
  // Specifies that the enum is deprecated.
  bool deprecated = 4;
  // Additional external documentation for this enum.
  ExternalDocumentation external_docs = 5;
  // A free-form property to include an example.
  string example = 6;
  // Allows referencing another schema. Serializes to "$ref" in JSON.
  string ref = 7 [json_name = "$ref"];
  // Custom properties that start with "x-" such as "x-foo".
  map<string, google.protobuf.Value> extensions = 8;
}

// `Tag` is a representation of OpenAPI v3 specification's Tag object.
//
// See: https://spec.openapis.org/oas/v3.1.0#tag-object
//
message Tag {
  // The name of the tag.
  string name = 1;
  // A description for the tag. CommonMark syntax MAY be used for rich text
  // representation.
  string description = 2;
  // Additional external documentation for this tag.
  ExternalDocumentation external_docs = 3;
  // Custom properties that start with "x-" such as "x-foo".
  map<string, google.protobuf.Value> extensions = 4;
}

// `ExternalDocumentation` is a representation of OpenAPI v3 specification's
// External Documentation object.
//
// See: https://spec.openapis.org/oas/v3.1.0#external-documentation-object
//
message ExternalDocumentation {
  // A description of the target documentation. CommonMark syntax MAY be used
  // for rich text representation.
  string description = 1;
  // REQUIRED. The URL for the target documentation.
  string url = 2;
}

// `SecurityScheme` is a representation of OpenAPI v3 specification's
// Security Scheme object.
//
// See: https://spec.openapis.org/oas/v3.1.0#security-scheme-object
//
message SecurityScheme {
  // The type of the security scheme.
  enum Type {
    TYPE_INVALID = 0;
    TYPE_API_KEY = 1;
    TYPE_HTTP = 2;
    TYPE_OAUTH2 = 3;
    TYPE_OPEN_ID_CONNECT = 4;
  }

  // The location of the API key.
  enum In {
    IN_INVALID = 0;
    IN_QUERY = 1;
    IN_HEADER = 2;
    IN_COOKIE = 3;
  }

  // REQUIRED. The type of the security scheme.
  Type type = 1;
  // A description for security scheme.
  string description = 2;
  // REQUIRED for apiKey. The name of the header, query or cookie parameter.
  string name = 3;
  // REQUIRED for apiKey. The location of the API key.
  In in = 4;
  // REQUIRED for http. The name of the HTTP Authorization scheme.
  string scheme = 5;
  // A hint to the client to identify how the bearer token is formatted.
  string bearer_format = 6;
  // REQUIRED for oauth2. An object containing configuration information for
  // the flow types supported.
  OAuthFlows flows = 7;
  // REQUIRED for openIdConnect. OpenId Connect URL to discover OAuth2
  // configuration values.
  string open_id_connect_url = 8;
  // Custom properties that start with "x-" such as "x-foo".
  map<string, google.protobuf.Value> extensions = 9;
}

// `OAuthFlows` is a representation of OpenAPI v3 specification's OAuth Flows object.
//
// See: https://spec.openapis.org/oas/v3.1.0#oauth-flows-object
//
message OAuthFlows {
  // Configuration for the OAuth Implicit flow.
  OAuthFlow implicit = 1;
  // Configuration for the OAuth Resource Owner Password flow.
  OAuthFlow password = 2;
  // Configuration for the OAuth Client Credentials flow.
  OAuthFlow client_credentials = 3;
  // Configuration for the OAuth Authorization Code flow.
  OAuthFlow authorization_code = 4;
  // Custom properties that start with "x-" such as "x-foo".
  map<string, google.protobuf.Value> extensions = 5;
}

// `OAuthFlow` is a representation of OpenAPI v3 specification's OAuth Flow object.
//
// See: https://spec.openapis.org/oas/v3.1.0#oauth-flow-object
//
message OAuthFlow {
  // The authorization URL to be used for this flow.
  string authorization_url = 1;
  // The token URL to be used for this flow.
  string token_url = 2;
  // The URL to be used for obtaining refresh tokens.
  string refresh_url = 3;
  // REQUIRED. The available scopes for the OAuth2 security scheme.
  map<string, string> scopes = 4;
  // Custom properties that start with "x-" such as "x-foo".
  map<string, google.protobuf.Value> extensions = 5;
}

// `SecurityRequirement` is a representation of OpenAPI v3 specification's
// Security Requirement object.
//
// See: https://spec.openapis.org/oas/v3.1.0#security-requirement-object
//
message SecurityRequirement {
  // The list of scope names required for the execution.
  message SecurityRequirementValue {
    repeated string scope = 1;
  }
  // Each name MUST correspond to a security scheme which is declared in the
  // Security Schemes under the Components Object.
  map<string, SecurityRequirementValue> security_requirement = 1;
}
